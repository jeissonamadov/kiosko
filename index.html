<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kiosko</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: sans-serif;
    background: #f0f4f8;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  h1 { font-size: 1.6rem; color: #1a1a2e; margin-bottom: 8px; }
  p.sub { color: #555; margin-bottom: 28px; font-size: 0.95rem; }
  .card {
    background: white;
    border-radius: 16px;
    padding: 28px 24px;
    width: 100%;
    max-width: 400px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    text-align: center;
  }
  input[type="text"] {
    width: 100%;
    padding: 14px 16px;
    font-size: 1.2rem;
    border: 2px solid #ddd;
    border-radius: 10px;
    outline: none;
    text-align: center;
    letter-spacing: 2px;
    transition: border 0.2s;
  }
  input[type="text"]:focus { border-color: #4361ee; }
  .hint { font-size: 0.8rem; color: #999; margin-top: 8px; }
  .resultado {
    margin-top: 24px;
    padding: 20px;
    border-radius: 12px;
    display: none;
  }
  .resultado.ok { background: #e8f5e9; border: 2px solid #66bb6a; }
  .resultado.error { background: #ffebee; border: 2px solid #ef5350; }
  .nombre { font-size: 1.3rem; font-weight: bold; color: #1a1a2e; margin-bottom: 8px; }
  .precio { font-size: 2rem; font-weight: 900; color: #4361ee; }
  .codigo { font-size: 0.8rem; color: #999; margin-top: 6px; }
  .error-msg { color: #c62828; font-size: 1rem; }
</style>
</head>
<body>

<div class="card">
  <h1>🏪 Kiosko</h1>
  <p class="sub">Escanea o escribe el código de barras</p>

  <input type="text" id="codigoInput" placeholder="_ _ _ _ _ _ _ _" autofocus autocomplete="off">
  <p class="hint">El lector llenará esto automáticamente</p>

  <div class="resultado" id="resultado">
    <div class="nombre" id="nombreProd"></div>
    <div class="precio" id="precioProd"></div>
    <div class="codigo" id="codigoProd"></div>
  </div>
</div>

<script>
const productos = [
  { codigo: "7702435001234", nombre: "Coca Cola 3 LIT", precio: 12000 },
  { codigo: "0", nombre: "Coca Cola 3 LIT", precio: 12000 }
  // Aquí se agregarán más productos
];

const db = {};
productos.forEach(p => db[p.codigo.trim()] = p);

const input = document.getElementById("codigoInput");
const resultado = document.getElementById("resultado");
const nombreEl = document.getElementById("nombreProd");
const precioEl = document.getElementById("precioProd");
const codigoEl = document.getElementById("codigoProd");

function formatPeso(n) {
  return n.toLocaleString("es-CO") + " PESOS";
}

function buscar(codigo) {
  codigo = codigo.trim();
  if (!codigo) return;
  const prod = db[codigo];
  resultado.style.display = "block";
  if (prod) {
    resultado.className = "resultado ok";
    nombreEl.textContent = prod.nombre;
    precioEl.textContent = formatPeso(prod.precio);
    codigoEl.textContent = "Código: " + codigo;
  } else {
    resultado.className = "resultado error";
    nombreEl.innerHTML = '<span class="error-msg">❌ Producto no encontrado</span>';
    precioEl.textContent = "";
    codigoEl.textContent = "Código: " + codigo;
  }
}

let timer;
input.addEventListener("input", () => {
  clearTimeout(timer);
  timer = setTimeout(() => {
    buscar(input.value);
    setTimeout(() => { input.value = ""; input.focus(); }, 1200);
  }, 300);
});

input.addEventListener("keydown", e => {
  if (e.key === "Enter") {
    clearTimeout(timer);
    buscar(input.value);
    setTimeout(() => { input.value = ""; input.focus(); }, 1200);
  }
});
</script>
</body>
</html>
